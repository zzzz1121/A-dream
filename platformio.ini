[platformio]
default_envs = m5stack-core-esp32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED

[env:microduino-core-esp32]
board = microduino-core-esp32
upload_port = COM5
monitor_port = COM5
lib_deps =
    ${env.lib_deps}
    someweisguy/esp_dmx @ ^4.1.0
build_src_filter =
    -<*>
    +<microduino_core_esp32_test/>

[env:microduino-core-esp32-dmx-spotlight-test]
board = microduino-core-esp32
upload_port = COM5
monitor_port = COM5
lib_deps =
    ${env.lib_deps}
    someweisguy/esp_dmx @ ^4.1.0
build_src_filter =
    -<*>
    +<microduino_core_esp32_dmx_spotlight_test/>

[env:microduino-core-esp32-stepper-pin-diagnostic]
board = microduino-core-esp32
upload_port = COM5
monitor_port = COM5
lib_deps =
    ${env.lib_deps}
build_src_filter =
    -<*>
    +<microduino_core_esp32_stepper_pin_diagnostic/>

[env:esp32-wroom-32]
board = esp32dev
build_src_filter =
    -<*>
    +<esp32_wroom_32_test/>

[env:m5stack-core-esp32]
board = m5stack-core-esp32
board_build.partitions = huge_app.csv
upload_port = COM6
monitor_port = COM6
lib_deps =
    ${env.lib_deps}
    m5stack/M5Stack
build_src_filter =
    -<*>
    +<m5stack_core_esp32_test/>
